<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .login-box { background: #fff; padding: 30px 40px; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.15); width: 340px; }
        .login-box h2 { text-align: center; margin-bottom: 20px; }
        .login-box input[type=text], .login-box input[type=password] { width: 100%; padding: 10px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        .login-box button:hover { background: #3367d6; }
        .msg-error { color: #d32f2f; text-align: center; margin-bottom: 10px; }
        .msg-logout { color: #388e3c; text-align: center; margin-bottom: 10px; }
        .accounts { margin-top: 18px; font-size: 13px; color: #555; }
        .accounts table { width: 100%; border-collapse: collapse; margin-top: 6px; }
        .accounts td { padding: 3px 6px; border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Book Manager &#8211; Login</h2>

    <div th:if="${param.error}" class="msg-error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="msg-logout">You have been logged out.</div>

    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required autofocus/>
        <input type="password" name="password" placeholder="Password" required/>
        <button type="submit">Login</button>
    </form>

    <div class="accounts">
        <strong>Phân quyền:</strong>
        <table>
            <tr><td><b>USER</b></td><td>Chỉ xem danh sách sách</td></tr>
            <tr><td><b>ADMIN</b></td><td>Thêm / Sửa / Xoá sách</td></tr>
        </table>
        <p style="margin-top:8px;font-size:12px;color:#888;">Tài khoản được tạo trong database.</p>
    </div>
</div>
</body>
</html>
